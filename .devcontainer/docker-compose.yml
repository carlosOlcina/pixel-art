services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    command: sleep infinity

    volumes:
      - ..:/workspaces/${LOCAL_WORKSPACE_FOLDER_BASENAME}

    env_file:
      - ../environment/.env.dev
      - ../environment/.env.local

    networks:
      - pixelart-devcontainer

    depends_on:
      - db

  db:
    image: mariadb:10.6
    restart: unless-stopped
    volumes:
      - pixelart-devcontainer-db:/var/lib/mysql
    env_file:
      - ../environment/.env.dev
      - ../environment/.env.local
    networks:
      - pixelart-devcontainer


volumes:
  pixelart-devcontainer-db:

networks:
  pixelart-devcontainer:
    driver: bridge
