<section aria-label="proyectos">
  @for (project of projects; track project.id) {
    <article
      class="project"
      [ngStyle]="{'background-image': `url(${project.image})`}"
      [attr.aria-label]="project.description"
    >
      <landing-title-2 class="title">
        {{ project.title }}
      </landing-title-2>
    </article>
  }
</section>
