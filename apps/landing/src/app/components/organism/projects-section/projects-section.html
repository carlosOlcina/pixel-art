<section aria-label="proyectos">
  @for (project of projects; track project.id) {
    <article
      [ngClass]="{
        project: true,
        next: project.id === nextSection(),
        out: project.id === outSection()
      }"
      [style.background-image]="'url(' + project.image + ')'"
      [attr.aria-label]="project.description"
    >
      <landing-title-2 class="title">
        {{ project.title }}
      </landing-title-2>
    </article>
  }
</section>
