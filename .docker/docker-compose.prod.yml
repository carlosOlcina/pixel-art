volumes:
  mariadb-prod-data:

name: pixelart
env_file:
  - .env.prod
  - .env.local

services:
  db:
    image: mariadb:10.6
    restart: always
    networks:
      - app-network
    volumes:
      - mariadb-prod-data:/var/lib/mysql
    env_file:
      - .env.prod
      - .env.local
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_prod_pass}
      MARIADB_DATABASE: ${DB_NAME:-pixelart}
      MARIADB_USER: ${DB_USER:-prod_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-prod_pass}

  api:
    build:
      context: ..
      dockerfile: .docker/Dockerfile.prod
      target: api-runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    environment:
      PORT: ${PORT:-3000}
      DATABASE_HOST: ${DB_HOST:-db}
      DATABASE_PORT: ${DB_PORT:-3306}
      DATABASE_USER: ${DB_USER:-prod_user}
      DATABASE_PASSWORD: ${DB_PASSWORD:-prod_pass}
      DATABASE_NAME: ${DB_NAME:-pixelart}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}

  landing:
    build:
      context: ..
      dockerfile: .docker/Dockerfile.prod
      target: landing-runtime
    restart: always
    depends_on:
      - api
    networks:
      - app-network
    environment:
      PORT: ${PORT:-4000}
      API_URL: ${API_URL:-http://api:3000}
      NODE_ENV: ${NODE_ENV:-production}

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../.nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ../.nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
      - landing
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge
